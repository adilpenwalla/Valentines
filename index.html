<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Valentine?</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    height: 100vh;
    margin: 0;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    overflow: hidden;
    touch-action: manipulation;
  }

  .card {
    position: absolute;
    left: 50%;
    top: 40%;
    transform: translate(-50%, -50%);
    background: white;
    padding: 42px;
    border-radius: 26px;
    text-align: center;
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    z-index: 2;
  }

  h1 {
    margin-bottom: 28px;
    font-size: 2.2rem;
    color: #e63946;
  }

  button {
    font-size: 1.4rem;
    padding: 18px 44px;
    border-radius: 999px;
    border: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  #yes {
    background: #e63946;
    color: white;
  }

  #no {
    position: fixed;
    background: #ff5c8a;
    color: white;
    left: 50%;
    top: 70%;
    transform: translate(-50%, -50%);
    transition: transform 0.18s ease-out;
    z-index: 3;
  }
</style>
</head>

<body>

<div class="card">
  <h1>Will you be my Valentine? 💖</h1>
  <button id="yes">YES</button>
</div>

<button id="no">NO</button>

<script>
  const noBtn = document.getElementById("no");

  let pos = { x: window.innerWidth / 2, y: window.innerHeight * 0.7 };
  let isMoving = false;

  function clamp(val, min, max) {
    return Math.max(min, Math.min(val, max));
  }

  function moveAway(fromX, fromY) {
    if (isMoving) return;
    isMoving = true;

    const rect = noBtn.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;

    const angle = Math.atan2(cy - fromY, cx - fromX);
    const distance = 160;

    pos.x += Math.cos(angle) * distance;
    pos.y += Math.sin(angle) * distance;

    const pad = 16;
    pos.x = clamp(pos.x, pad, window.innerWidth - rect.width - pad);
    pos.y = clamp(pos.y, pad, window.innerHeight - rect.height - pad);

    noBtn.style.left = pos.x + "px";
    noBtn.style.top = pos.y + "px";
    noBtn.style.transform = "translate(0,0)";

    setTimeout(() => isMoving = false, 200);
  }

  // Trigger BEFORE click on iOS
  noBtn.addEventListener("pointerdown", (e) => {
    e.preventDefault();
    moveAway(e.clientX, e.clientY);
  });

  // Also repel when finger gets close
  document.addEventListener("pointermove", (e) => {
    moveAway(e.clientX, e.clientY);
  }, { passive: true });

  document.getElementById("yes").onclick = () => {
    document.body.innerHTML = `
      <div style="
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:linear-gradient(135deg,#ff9a9e,#fad0c4);
        font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
        text-align:center;">
        <h1 style="color:#e63946;font-size:2.6rem;">
          YAY!!! 💘<br>
          You’re my Valentine 😘
        </h1>
      </div>`;
  };
</script>

</body>
</html>
